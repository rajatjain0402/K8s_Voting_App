name: CI - Build & Push to ACR

on:
  push:
    branches:
      - main

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  IMAGE_TAG: v1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build Vote Image
        run: docker build -t $ACR_NAME.azurecr.io/vote-app:$IMAGE_TAG ./vote

      - name: Build Result Image
        run: docker build -t $ACR_NAME.azurecr.io/result-app:$IMAGE_TAG ./result

      - name: Build Worker Image
        run: docker build -t $ACR_NAME.azurecr.io/worker-app:$IMAGE_TAG ./worker

      - name: Push Vote Image
        run: docker push $ACR_NAME.azurecr.io/vote-app:$IMAGE_TAG

      - name: Push Result Image
        run: docker push $ACR_NAME.azurecr.io/result-app:$IMAGE_TAG

      - name: Push Worker Image
        run: docker push $ACR_NAME.azurecr.io/worker-app:$IMAGE_TAG
